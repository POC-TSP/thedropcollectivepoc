  text_color: "#ffffff"
  accent_color: "#ffb690 (copper/gold)"
  border_color: "#ccd0d6"
  font_family: "Futura PT, sans-serif"
  heading_style: uppercase with letter-spacing
  button_style: rectangular (no border-radius), bordered, uppercase

navigation:
  type: simple horizontal menu
  items:
    - About
    - Whiskies
    - Tequilas
    - Mezcal
    - Blog
    - Sign Up
  mobile: off-canvas slide-out menu
  logo: Drop Collective white logo

footer:
  sections:
    - Logo + newsletter signup CTA
    - Multi-column category navigation with sub-items
    - Copyright, legal links, social media (Instagram, Facebook)
  notes: Includes age gate compliance language

import_infrastructure:
  parsers:
    - carousel.js (Foundation Orbit slides)
    - cards.js (blog post cards)
    - columns.js (two-column grid layout)
    - form.js (WordPress forms)
  transformers:
    - thedropcollective-cleanup.js (removes header, footer, nav, modals, consent)
  import_script: import-thedropcollective.js
  bundle: import-thedropcollective.bundle.js

content_import:
  total_processed: 48
  successful: 47
  failed: 1
  failure_notes: Homepage failed with bundling error (cwd function) but content/index.plain.html was still generated
  output_directory: content/
  report: tools/importer/reports/import-thedropcollective.report.xlsx

assets:
  images: Referenced via original WordPress URLs (thedropcollective.ca/wp-content/uploads/)
  dam_migration: Images will need to be uploaded to AEM DAM and references updated
  no_dm_scene7: true (all images are standard WordPress uploads)

technical_decisions:
  - decision: Single import script for all 17 templates
    reason: Most templates share the same block set; URL-based template matching handles variations
  - decision: Blog articles treated as all default content
    reason: No blocks needed - text, headings, images, and blockquotes only
  - decision: Age verification modal dismissed via cleanup transformer
    reason: Not authorable content; handled client-side
  - decision: Futura PT font loaded from system/Adobe Fonts
    reason: Not available as self-hosted web font; needs Typekit integration in production
  - decision: Dark theme applied globally
    reason: Original site is dark-themed throughout

known_limitations:
  - "Most Read" section on blog articles loads dynamically - needs fragment or auto-block implementation
  - Forms imported as structural description only - need AEM Forms integration
  - Adobe Fonts (Typekit) integration needed for Futura PT in production
  - Image DAM migration not yet performed (URLs still reference source site)
  - Age gate implementation needed as client-side component (not part of content)

next_steps:
  - Upload images to AEM DAM and update references
  - Configure Adobe Fonts (Typekit) for Futura PT
  - Implement age verification as client-side component
  - Create "Most Read" fragment or auto-block for related posts
  - Review and refine form blocks with AEM Forms integration
  - Performance testing and Lighthouse audit
  - Content author review and UAT
